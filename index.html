<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Focus Timer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-container">
      <section class="timer-panel">
        <div class="theme-switch">
          <button type="button" class="theme-toggle-button" aria-pressed="false">Switch to Light</button>
        </div>

        <div class="mode-select">
          <button type="button" class="mode-button active" data-minutes="25">Work (25m)</button>
          <button type="button" class="mode-button" data-minutes="5">Break (5m)</button>
        </div>

        <h1 id="timer-display" class="timer-display">25:00</h1>

        <div class="controls">
          <button type="button" id="start-btn" class="control-button start-button">Start</button>
          <button type="button" id="pause-btn" class="control-button pause-button">Pause</button>
          <button type="button" id="reset-btn" class="control-button reset-button">Reset</button>
        </div>

        <div class="sounds-section">
          <h2>Ambient Sounds</h2>
          <div class="sound-buttons">
            <button type="button" class="sound-button" data-sound="rain" aria-pressed="false">🌧️ Rain</button>
            <button type="button" class="sound-button" data-sound="fireplace" aria-pressed="false">🔥 Fireplace</button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
